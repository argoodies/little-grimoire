name: Android → APK

# Godot 用预建 Android 模板导出一个 debug 签名的 APK（可直接装机测试），作为构建产物下载。
# 不用 gradle/NDK，只需 JDK + Android SDK 的 build-tools（apksigner/zipalign）。手动触发。
on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"

jobs:
  android:
    name: Android → APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK (cmdline-tools + build-tools)
        run: |
          set -eo pipefail
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools"
          cd "$SDK/cmdline-tools"
          curl -sSL -o clt.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q clt.zip && mv cmdline-tools latest
          export ANDROID_HOME="$SDK"
          export ANDROID_SDK_ROOT="$SDK"
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "build-tools;34.0.0" "platforms;android-34" >/dev/null

      - name: Install Godot + export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -sSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          GODOT_BIN="$PWD/$(ls Godot_v*_linux.x86_64)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TPL="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz
          mv templates/* "$TPL/"
          "$GODOT_BIN" --version

      - name: Generate debug keystore
        run: |
          set -eo pipefail
          keytool -genkeypair -v -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings (SDK + debug keystore)
        run: |
          set -eo pipefail
          CFG="$HOME/.config/godot"
          mkdir -p "$CFG"
          cat > "$CFG/editor_settings-4.tres" <<TRES
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$HOME/android-sdk"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          TRES
          echo "--- editor_settings ---"; cat "$CFG/editor_settings-4.tres"

      - name: Import project
        run: |
          set -eo pipefail
          "$GODOT_BIN" --headless --import

      - name: Export Android APK (debug-signed)
        run: |
          set -eo pipefail
          mkdir -p build/android
          "$GODOT_BIN" --headless --export-debug "Android" build/android/crystal.apk
          ls -la build/android
          [ -f build/android/crystal.apk ] || { echo "::error::APK not produced"; exit 1; }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystal-android-apk
          path: build/android/crystal.apk
          if-no-files-found: error
