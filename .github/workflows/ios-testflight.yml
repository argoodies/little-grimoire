name: iOS → TestFlight

# Godot 导出 iOS Xcode 工程 → xcodebuild 自动签名归档 → altool 上传到 App Store Connect。
# 发布到 App 记录 io.github.argoodies.crystal（6791685320），复用 ASC API 密钥。手动触发。
# 需 macos-15（含 Xcode 26 / iOS 26 SDK，Apple 强制要求）。
on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  TEAM_ID: "9TGD35M5GT"

jobs:
  ios:
    name: iOS → TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -eo pipefail
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sed 's#.*/Xcode_##;s#.app##' | sort -V | tail -1)
          sudo xcode-select -s "/Applications/Xcode_${LATEST}.app/Contents/Developer"
          xcodebuild -version

      - name: Write App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install Godot + iOS export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          curl -sSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot.app/Contents/MacOS/Godot"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TPL="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz
          mv templates/* "$TPL/"
          "$GODOT_BIN" --version

      - name: Import project
        run: |
          set -eo pipefail
          "$GODOT_BIN" --headless --import

      - name: Export iOS Xcode project (Godot)
        run: |
          set -eo pipefail
          mkdir -p build/ios
          # Godot 导出时会顺带用 xcodebuild 归档，但没有 API-key 授权、签名默认冲突会失败。
          # 我们只需要它生成好 Xcode 工程，随后自己用 ASC 密钥归档，故忽略其内部构建失败。
          "$GODOT_BIN" --headless --export-release "iOS" build/ios/little-grimoire.ipa || true
          XCPROJ=$(find build/ios -maxdepth 2 -name '*.xcodeproj' | head -1)
          [ -n "$XCPROJ" ] || { echo "::error::Godot 未生成 Xcode 工程"; exit 1; }
          echo "--- build/ios ---"; ls -R build/ios | head -80

      - name: Set build number + archive & upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -eo pipefail
          XCPROJ=$(find build/ios -maxdepth 2 -name '*.xcodeproj' | head -1)
          [ -n "$XCPROJ" ] || { echo "::error::Godot 未生成 Xcode 工程"; exit 1; }
          SCHEME=$(basename "$XCPROJ" .xcodeproj)
          echo "xcodeproj=$XCPROJ scheme=$SCHEME"

          # build 号抬到 1000+，避免与共用同一 App id 的旧 Swift 项目(号 ~40s)撞车，确保本构建永远最新。
          BUILD_NUM=$(( 1000 + ${{ github.run_number }} ))
          echo "BUILD_NUM=$BUILD_NUM"
          # 改生成工程里所有 Info.plist：唯一 build 号 + UIDeviceFamily（Godot 没写，Apple 校验必需）
          # + 支持的本地化语言（配合下面注入的 lproj，实现随设备语言动态显示应用名）。
          for PL in $(find build/ios -name '*-Info.plist' -o -name 'Info.plist'); do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :CFBundleLocalizations" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations array" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:0 string en" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:1 string ja" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:2 string zh-Hant" "$PL" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:3 string zh-Hans" "$PL" 2>/dev/null || true
          done

          # 动态应用名：Godot 4.6 iOS 导出忽略 name_localized，这里手动注入本地化 InfoPlist.strings。
          # 英文 → Crystal Puzzle；繁/简中 → 擦水晶；日文/其他 → 水晶磨き（base + ja.lproj）。
          BASEDIR=$(dirname "$XCPROJ")/"$SCHEME"
          mkdir -p "$BASEDIR/en.lproj" "$BASEDIR/ja.lproj" "$BASEDIR/zh-Hant.lproj" "$BASEDIR/zh-Hans.lproj"
          printf '"CFBundleDisplayName" = "Crystal Puzzle";\n"CFBundleName" = "Crystal Puzzle";\n' > "$BASEDIR/en.lproj/InfoPlist.strings"
          printf '"CFBundleDisplayName" = "水晶磨き";\n"CFBundleName" = "水晶磨き";\n' > "$BASEDIR/ja.lproj/InfoPlist.strings"
          printf '"CFBundleDisplayName" = "擦水晶";\n"CFBundleName" = "擦水晶";\n' > "$BASEDIR/zh-Hant.lproj/InfoPlist.strings"
          printf '"CFBundleDisplayName" = "擦水晶";\n"CFBundleName" = "擦水晶";\n' > "$BASEDIR/zh-Hans.lproj/InfoPlist.strings"
          gem install xcodeproj --quiet --no-document
          XCPROJ="$XCPROJ" SCHEME="$SCHEME" ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open(ENV["XCPROJ"])
            proj.root_object.known_regions |= ["en", "ja", "zh-Hant", "zh-Hans", "Base"]
            vg = proj.objects.find { |o| o.isa == "PBXVariantGroup" && o.display_name == "InfoPlist.strings" }
            abort("no InfoPlist.strings variant group") unless vg
            %w[en ja zh-Hant zh-Hans].each do |loc|
              next if vg.children.any? { |c| (c.respond_to?(:name) && c.name == loc) || (c.respond_to?(:path) && c.path.to_s.include?("#{loc}.lproj")) }
              ref = proj.new(Xcodeproj::Project::Object::PBXFileReference)
              ref.name = loc
              ref.path = "#{loc}.lproj/InfoPlist.strings"
              ref.source_tree = "<group>"
              ref.last_known_file_type = "text.plist.strings"
              vg.children << ref
            end
            proj.save
            puts "variant children: " + vg.children.map { |c| c.respond_to?(:name) ? c.name : c.display_name }.inspect
          '
          echo "== injected lproj =="; for f in "$BASEDIR"/*.lproj/InfoPlist.strings; do echo "--- $f"; cat "$f"; done

          xcodebuild -project "$XCPROJ" -scheme "$SCHEME" -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/little-grimoire-ios.xcarchive" \
            CURRENT_PROJECT_VERSION=$BUILD_NUM \
            CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Development" PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" -authenticationKeyIssuerID "$ASC_ISSUER_ID" archive

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/little-grimoire-ios.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ios" -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          IPA=$(find "$RUNNER_TEMP/export-ios" -name "*.ipa" | head -1)
          echo "ipa=$IPA"
          # altool 对 409 等错误会 exit 0，只把 ERROR 打到 stdout，须解析后再判失败。
          xcrun altool --upload-app -f "$IPA" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$RUNNER_TEMP/altool-ios.log"
          if grep -qiE 'ERROR:|Validation failed' "$RUNNER_TEMP/altool-ios.log"; then
            echo "::error::altool 上传 App Store Connect 失败（见上方日志的 Validation 详情）"
            exit 1
          fi

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: little-grimoire-ios-ipa
          path: ${{ runner.temp }}/export-ios/**/*.ipa
          if-no-files-found: warn
