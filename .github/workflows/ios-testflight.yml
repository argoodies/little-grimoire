name: iOS → TestFlight

# Godot 导出 iOS Xcode 工程 → xcodebuild 自动签名归档 → altool 上传。
# 发布到既有 App 记录 io.argoodies.deskfeel（6787916716），复用 ASC API 密钥。
# 手动触发。注意 Apple 每日上传上限对 iOS 仍生效（altool 输出报错即让 job 失败）。
on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  TEAM_ID: "9TGD35M5GT"

jobs:
  ios:
    name: iOS → TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -eo pipefail
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sed 's#.*/Xcode_##;s#.app##' | sort -V | tail -1)
          sudo xcode-select -s "/Applications/Xcode_${LATEST}.app/Contents/Developer"
          xcodebuild -version

      - name: Write App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install Godot + iOS export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          curl -sSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot.app/Contents/MacOS/Godot"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TPL="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz
          mv templates/* "$TPL/"
          "$GODOT_BIN" --version

      - name: Import project
        run: |
          set -eo pipefail
          "$GODOT_BIN" --headless --import

      - name: Export iOS Xcode project (Godot)
        run: |
          set -eo pipefail
          mkdir -p build/ios
          # Godot 导出时会顺带用 xcodebuild 归档，但没有 API-key 授权、签名默认冲突会失败。
          # 我们只需要它生成好 Xcode 工程，随后自己用 ASC 密钥归档，故忽略其内部构建失败。
          "$GODOT_BIN" --headless --export-release "iOS" build/ios/deskfeel.ipa || true
          XCPROJ=$(find build/ios -maxdepth 2 -name '*.xcodeproj' | head -1)
          [ -n "$XCPROJ" ] || { echo "::error::Godot 未生成 Xcode 工程"; exit 1; }
          echo "--- build/ios ---"; ls -R build/ios | head -80

      - name: Set build number + archive & upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -eo pipefail
          XCPROJ=$(find build/ios -maxdepth 2 -name '*.xcodeproj' | head -1)
          [ -n "$XCPROJ" ] || { echo "::error::Godot 未生成 Xcode 工程"; exit 1; }
          SCHEME=$(basename "$XCPROJ" .xcodeproj)
          echo "xcodeproj=$XCPROJ scheme=$SCHEME"

          # 每次构建唯一 build 号：改生成工程里所有 Info.plist 的 CFBundleVersion。
          for PL in $(find build/ios -name '*-Info.plist' -o -name 'Info.plist'); do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PL" 2>/dev/null || true
          done

          xcodebuild -project "$XCPROJ" -scheme "$SCHEME" -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/DeskFeel-ios.xcarchive" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Development" PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" -authenticationKeyIssuerID "$ASC_ISSUER_ID" archive

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/DeskFeel-ios.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ios" -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          IPA=$(find "$RUNNER_TEMP/export-ios" -name "*.ipa" | head -1)
          echo "ipa=$IPA"
          # altool 对 409 等错误会 exit 0，只把 ERROR 打到 stdout，须解析后再判失败。
          xcrun altool --upload-app -f "$IPA" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$RUNNER_TEMP/altool-ios.log"
          if grep -qiE 'ERROR:|Validation failed' "$RUNNER_TEMP/altool-ios.log"; then
            echo "::error::altool 上传 iOS 失败（见上方日志，如每日上传上限 409）"
            exit 1
          fi

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskfeel-godot-ios-ipa
          path: ${{ runner.temp }}/export-ios/**/*.ipa
          if-no-files-found: warn
